<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">

    <!--  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">-->
    <!--  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>-->

    <div class="container mt-4">
        <h2>Список тарифов на боксы</h2>

        <!-- Кнопка открытия формы добавления -->
        <button class="btn btn-primary mb-3"
                data-bs-target="#addPriceModal"
                data-bs-toggle="modal"
                onclick="clearForm('Добавить тариф')"
                type="button">
            Добавить новый тариф
        </button>

        <!-- Таблица цен -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Бокс</th>
                <th>Цена (₽/мес)</th>
                <th>Дата начала</th>
                <th>Дата окончания</th>
                <th>Дата редактирования</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="curPrice : ${prices}">
                <td th:text="${curPrice.id}"></td>
                <td th:text="${curPrice.box.idBox}"></td>
                <td th:text="${curPrice.sumPrice}"></td>
                <td th:text="${#dates.format(curPrice.dateStart, 'dd.MM.yyyy')}"></td>
                <td th:text="${#dates.format(curPrice.dateEnd, 'dd.MM.yyyy')}"></td>
                <td th:text="${@generalService.format(curPrice.dateEdit, false)}"></td>
                <td>
                    <button class="btn btn-sm btn-warning"
                            data-bs-target="#addPriceModal"
                            data-bs-toggle="modal"
                            onclick="editModalForm(this, '/price/fragments/price_edit_modal', 'Редактировать тариф')"
                            th:attr="data-id=${curPrice.id},
                                     data-box-id=${curPrice.box.id},
                                     data-sum_price=${curPrice.sumPrice},
                                     data-date-start=${#dates.format(curPrice.dateStart, 'yyyy-MM-dd')},
                                     data-date-end=${#dates.format(curPrice.dateEnd, 'yyyy-MM-dd')}"
                            type="button">
                        Редактировать
                    </button>
                    <!-- Кнопка Удалить -->
                    <button class="btn btn-sm btn-danger"
                            data-bs-target="#deleteConfirmModal"
                            data-bs-toggle="modal"
                            onclick="setDeleteId(this)"
                            th:attr="data-id=${curPrice.id},
                                    data-object-from-url-delete='price',
                                    data-form-question-object='тариф для Бокса № ',
                                    data-form-question-name=${curPrice.box.idBox}"
                            type="button">
                        Удалить
                    </button>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Модальное окно для добавления/редактирования тарифа -->
        <div aria-hidden="true" aria-labelledby="addPriceModalLabel" class="modal fade" id="addPriceModal"
             tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="container">
                        <div id="content-modal-form-id" th:insert="~{price_edit_modal :: content_modal_form}"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Модальное окно подтверждения удаления -->
        <div aria-hidden="true"
             aria-labelledby="deleteConfirmModalLabel"
             class="modal fade"
             id="deleteConfirmModal"
             tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="deleteConfirmModalLabel">Подтверждение удаления</h5>
                        <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                    </div>
                    <div class="modal-body">
                        <a id="textFormQuestion"></a> <strong id="objectNameFormQuestion"></strong>?
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Отмена</button>
                        <a class="btn btn-danger" id="confirmDeleteBtn">Удалить</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
