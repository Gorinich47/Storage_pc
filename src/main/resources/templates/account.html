<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">

    <!--    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">-->
    <!--    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>-->

    <div class="container mt-4">
        <h2>Список счетов</h2>

        <!-- Кнопка открытия модальной формы добавления -->
        <button class="btn btn-primary mb-3"
                data-bs-target="#accountModal"
                data-bs-toggle="modal"
                onclick="clearForm();"
                type="button">
            Добавить счёт
        </button>

        <!-- Таблица счетов -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Дата создания</th>
                <th>Дата открытия</th>
                <th>Дата закрытия</th>
                <th>Боксы</th>
                <th>Клиент</th>
                <th>Сотрудник</th>
                <th>Статус</th>
                <th>Сумма (₽)</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="account : ${accounts}">
                <td th:text="${account.id}"></td>
                <td th:text="${@generalService.format(account.date, false)}"></td>
                <td th:text="${#dates.format(account.dateStart, 'dd.MM.yyyy')}"></td>
                <td th:text="${#dates.format(account.dateEnd, 'dd.MM.yyyy')}"></td>
                <td>
                    <span class="badge bg-info me-1" th:each="box : ${@generalService.sotrByIdBox(account.box)}"
                          th:text="${box.idBox}"></span>
                </td>
                <td th:text="${account.client.firstName + ' ' + account.client.lastName}"></td>
                <td th:text="${account.employee.firstName + ' ' + account.employee.lastName}"></td>
                <td>
                    <span th:switch="${account.statusBox}">
                        <span class="badge bg-success" th:case="'ACTIVE'">Активен</span>
                        <span class="badge bg-secondary" th:case="'CLOSED'">Закрыт</span>
                        <span class="badge bg-warning" th:case="*">Неизвестно</span>
                    </span>
                </td>
                <td th:text="${account.sumAmount}"></td>
                <td>
                    <!-- Кнопка Редактировать -->
                    <button class="btn btn-sm btn-warning me-1" data-bs-target="#accountModal"
                            data-bs-toggle="modal"
                            onclick="editAccount(this)"
                            th:attr="data-id=${account.id},
                                     data-date-start=${#dates.format(account.dateStart, 'yyyy-MM-dd')},
                                     data-date-end=${#dates.format(account.dateEnd, 'yyyy-MM-dd')},
                                     data-client-id=${account.client.id},
                                     data-employee-id=${account.employee.id},
                                     data-status=${account.statusBox},
                                     data-sum-amount=${account.sumAmount}"
                            type="button">
                        Редактировать
                    </button>
                    <!--                    new tools.jackson.databind.ObjectMapper().writeValueAsString(account.getBox())-->
                    <!--                    data-boxes=${#account.box != null ? new tools.jackson.databind.ObjectMapper.ObjectMapper().writeValueAsString(account.box) : '[]'}"-->
                    <!-- Кнопка Удалить -->
                    <button class="btn btn-sm btn-danger" data-bs-target="#deleteConfirmModal"
                            data-bs-toggle="modal"
                            onclick="setDeleteId(this)"
                            th:attr="data-id=${account.id},
                                    data-object-from-url-delete='account',
                                    data-form-question-object=' счет клиента ',
                                    data-form-question-name=${account.client.firstName + ' ' + account.client.lastName}"
                            type="button">
                        Удалить
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно для добавления/редактирования счёта -->
    <div aria-hidden="true" aria-labelledby="accountModalLabel" class="modal fade" id="accountModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="container">
                    <div id="content-modal-form-id" th:insert="~{account_edit_modal :: content_modal_form}"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div aria-hidden="true" aria-labelledby="deleteConfirmModalLabel" class="modal fade" id="deleteConfirmModal"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteConfirmModalLabel">Подтвердите удаление</h5>
                    <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <a id="textFormQuestion"></a> <strong id="objectNameFormQuestion"></strong>?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Отмена</button>
                    <a class="btn btn-danger" id="confirmDeleteBtn">Удалить</a>
                </div>
            </div>
        </div>
    </div>

</div>
