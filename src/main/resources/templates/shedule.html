<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">

    <div class="container mt-4">
        <h2>График работы сотрудников</h2>

        <!-- Кнопка открытия модального окна добавления -->
        <button class="btn btn-primary mb-3"
                data-bs-target="#addSheduleModal"
                data-bs-toggle="modal"
                onclick="clearForm()"
                type="button">
            Добавить запись в график
        </button>

        <!-- Таблица графика -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Дата записи</th>
                <th>Начало смены</th>
                <th>Конец смены</th>
                <th>Сотрудник</th>
                <th>Выходной</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="shedule : ${shedules}">
                <td th:text="${shedule.id}"></td>
                <td th:text="${@generalService.format(shedule.date, false)}"></td>
                <td th:text="${@generalService.format(shedule.dateStart, false)}"></td>
                <td th:text="${@generalService.format(shedule.dateEnd, false)}"></td>
                <td th:text="${shedule.employee.firstName + ' ' + shedule.employee.lastName}"></td>
                <td>
                    <span class="badge bg-success" th:if="${shedule.isHoliday}">Выходной</span>
                    <span class="badge bg-secondary" th:unless="${shedule.isHoliday}">Рабочий</span>
                </td>
                <td>
                    <!-- Кнопка Редактировать -->
                    <button class="btn btn-sm btn-warning me-1"
                            data-bs-target="#addSheduleModal"
                            data-bs-toggle="modal"
                            onclick="editModalForm(this, '/shedule/fragments/shedule_edit_modal', 'Редактировать запись журнала')"
                            th:attr="data-id=${shedule.id},
                           data-date-start=${@generalService.formatDateTimeForInput(shedule.dateStart)},
                           data-date-end=${@generalService.formatDateTimeForInput(shedule.dateEnd)},
                           data-employee-id=${shedule.employee.id},
                           data-is-holiday=${shedule.isHoliday}"
                            type="button">
                        Редактировать
                    </button>

                    <!-- Кнопка Удалить -->
                    <button
                            class="btn btn-sm btn-danger"
                            data-bs-target="#deleteConfirmModal"
                            data-bs-toggle="modal"
                            onclick="setDeleteId(this)"
                            th:attr="data-id=${shedule.id},
                          data-object-from-url-delete='shedule',
                          data-form-question-object='запись журнала работника ',
                          data-form-question-name=${shedule.employee.firstName + ' ' + shedule.employee.lastName}"
                            type="button">
                        Удалить
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно для добавления/редактирования графика -->
    <div aria-hidden="true" aria-labelledby="addSheduleModalLabel" class="modal fade" id="addSheduleModal"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div id="content-modal-form-id" th:insert="~{shedule_edit_modal :: content_modal_form}"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div aria-hidden="true"
         aria-labelledby="deleteConfirmModalLabel"
         class="modal fade"
         id="deleteConfirmModal"
         tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteConfirmModalLabel">Подтвердите удаление</h5>
                    <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <a id="textFormQuestion"></a> <strong id="objectNameFormQuestion"></strong>?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Отмена</button>
                    <a class="btn btn-danger" id="confirmDeleteBtn">Удалить</a>
                </div>
            </div>
        </div>
    </div>

</div>
