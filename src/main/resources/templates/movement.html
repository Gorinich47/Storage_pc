<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">

    <div class="container mt-4">
        <h2>Движения средств</h2>

        <!-- Кнопка открытия модального окна добавления -->
        <button class="btn btn-primary mb-3"
                data-bs-target="#addMovementModal"
                data-bs-toggle="modal"
                onclick="clearForm('Добавить движение');"
                type="button">
            Добавить движение
        </button>

        <!-- Таблица перемещений -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Дата и время</th>
                <th>Тип операции</th>
                <th>Сумма</th>
                <th>Счёт</th>
                <th>Клиент</th>
                <th>Сотрудник</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="movement : ${movements}">
                <td th:text="${movement.id}"></td>
                <td th:text="${@generalService.format(movement.date, true)}"></td>
                <td th:text="${movement.typeMovements.title}"></td>
                <td th:text="${movement.summ}"></td>
                <td th:text="${movement.account.getName()}"></td>
                <td th:text="${movement.client.getFullName()}"></td>
                <td th:text="${movement.employee.getFullName()}"></td>

                <td>
                    <!-- Кнопка Редактировать -->
                    <button class="btn btn-sm btn-warning me-1"
                            data-bs-target="#addMovementModal"
                            data-bs-toggle="modal"
                            onclick="editModalForm(this, '/movement/fragments/movement_edit_modal', 'Редактировать движение')"
                            th:attr="data-id=${movement.id},
                                     data-date=${@generalService.formatDateTimeForInput(movement.date)},
                                     data-type-movements=${movement.typeMovements},
                                     data-summ=${movement.summ},
                                     data-account-id=${movement.account.id},
                                     data-client-id=${movement.client.id},
                                     data-employee-id=${movement.employee.id}"
                            type="button">
                        Редактировать
                    </button>

                    <!-- Кнопка Удалить -->
                    <button class="btn btn-sm btn-danger"
                            data-bs-target="#deleteConfirmModal"
                            data-bs-toggle="modal"
                            onclick="setDeleteId(this)"
                            th:attr="data-id=${movement.id},
                                    data-object-from-url-delete='movement',
                                    data-form-question-object='движение ',
                                    data-form-question-name=${movement.id}"
                            type="button">
                        Удалить
                    </button>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="alert alert-info" th:if="${movements.empty}">
            Журнал перемещений пуст.
        </div>
    </div>

    <!-- Модальное окно для добавления/редактирования записи -->
    <div aria-hidden="true" aria-labelledby="addMovementModalLabel" class="modal fade" id="addMovementModal"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div id="content-modal-form-id" th:insert="~{movement_edit_modal :: content_modal_form}"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div aria-hidden="true" aria-labelledby="deleteConfirmModalLabel" class="modal fade" id="deleteConfirmModal"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteConfirmModalLabel">Подтвердите удаление</h5>
                    <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <a id="textFormQuestion"></a> <strong id="objectNameFormQuestion"></strong>?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Отмена</button>
                    <a class="btn btn-danger" id="confirmDeleteBtn">Удалить</a>
                </div>
            </div>
        </div>
    </div>

</div>
