<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div class="container mt-4">
        <h2>Список сотрудников</h2>

        <!-- Кнопка открытия модального окна добавления -->
        <button class="btn btn-primary mb-3" data-bs-target="#employeeModal"
                data-bs-toggle="modal"
                onclick="clearForm(); localStorage.setItem('activeTab', '#employee')"
                type="button">
            Добавить сотрудника
        </button>

        <!-- Таблица сотрудников -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Фамилия</th>
                <th>Имя</th>
                <th>Дата рождения</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Адрес</th>
                <th>Должность</th>
                <th>Дата приёма</th>
                <th>Дата увольнения</th>
                <th>Занятость</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="employee : ${employees}">
                <td th:text="${employee.id}"></td>
                <td th:text="${employee.firstName}"></td>
                <td th:text="${employee.lastName}"></td>
                <td th:text="${#dates.format(employee.birthDate, 'dd.MM.yyyy')}"></td>
                <td th:text="${employee.phoneNumber}"></td>
                <td th:text="${employee.emailAddress}"></td>
                <td th:text="${employee.address}"></td>
                <td th:text="${employee.postEmployee.title}"></td>
                <td th:text="${#dates.format(employee.dateStart, 'dd.MM.yyyy')}"></td>
                <td th:text="${#dates.format(employee.dateEnd, 'dd.MM.yyyy')}"></td>
                <td>
                    <span class="badge bg-success" th:if="${employee.isFullTime}">Полная</span>
                    <span class="badge bg-warning" th:unless="${employee.isFullTime}">Частичная</span>
                </td>
                <td>
                    <!-- Кнопка Редактировать -->
                    <button class="btn btn-sm btn-warning me-1" data-bs-target="#employeeModal"
                            data-bs-toggle="modal"
                            onclick="editEmployee(this)"
                            th:attr="data-id=${employee.id},
                                 data-first-name=${employee.firstName},
                                 data-last-name=${employee.lastName},
                                 data-birth-date=${#dates.format(employee.birthDate, 'yyyy-MM-dd')},
                                 data-phone-number=${employee.phoneNumber},
                                 data-email=${employee.emailAddress},
                                 data-address=${employee.address},
                                 data-post=${employee.postEmployee},
                                 data-date-start=${#dates.format(employee.dateStart, 'yyyy-MM-dd')},
                                 data-date-end=${#dates.format(employee.dateEnd, 'yyyy-MM-dd')},
                                 data-is-full-time=${employee.isFullTime}"
                            type="button">
                        Редактировать
                    </button>

                    <!-- Кнопка Удалить -->
                    <button class="btn btn-sm btn-danger" data-bs-target="#deleteConfirmModal"
                            data-bs-toggle="modal"
                            onclick="setDeleteId(this)"
                            th:attr="data-id=${employee.id}, data-name=${employee.firstName + ' ' + employee.lastName}"
                            type="button">
                        Удалить
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно для добавления/редактирования сотрудника -->
    <div aria-hidden="true" aria-labelledby="employeeModalLabel" class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form method="post" th:action="@{/employee/save}" th:object="${employee}">
                    <input id="employeeId" th:field="*{id}" type="hidden"/>

                    <div class="modal-header">
                        <h5 class="modal-title" id="employeeModalLabel">Добавить сотрудника</h5>
                        <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                    </div>

                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="firstName">Фамилия:</label>
                                <input class="form-control" id="firstName" required th:field="*{firstName}"
                                       type="text"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="lastName">Имя:</label>
                                <input class="form-control" id="lastName" required th:field="*{lastName}" type="text"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="birthDate">Дата рождения:</label>
                                <input class="form-control" id="birthDate" th:field="*{birthDate}" type="date"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="phoneNumber">Телефон:</label>
                                <input class="form-control" id="phoneNumber" required th:field="*{phoneNumber}"
                                       type="tel"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="emailAddress">Email:</label>
                                <input class="form-control" id="emailAddress" th:field="*{emailAddress}" type="email"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="address">Адрес:</label>
                                <input class="form-control" id="address" th:field="*{address}" type="text"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="postEmployee">Должность:</label>
                                <select class="form-select" id="postEmployee" th:field="*{postEmployee}">
                                    <option value="">Выберите должность</option>
                                    <option th:each="post : ${T(ru.storage.model.PostEmployee).values()}"
                                            th:text="${post.title}" th:value="${post}">Post
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3 form-check">
                                <!--              <div class="col-md-6 mb-3">-->
                                <!--                <label></label>-->
                                <!--              </div>-->
                                <input class="form-check-input" id="isFullTime" th:field="*{isFullTime}"
                                       type="checkbox"/>
                                <label class="form-check-label" for="isFullTime">Полная занятость</label>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="dateStart">Дата приёма:</label>
                                <input class="form-control" id="dateStart" required th:field="*{dateStart}"
                                       type="date"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="dateEnd">Дата увольнения:</label>
                                <input class="form-control" id="dateEnd" th:field="*{dateEnd}" type="date"/>
                            </div>

                        </div>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" onclick="clearForm()" type="button">
                            Отмена
                        </button>
                        <button class="btn btn-primary" type="submit">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div aria-hidden="true" aria-labelledby="deleteConfirmModalLabel" class="modal fade" id="deleteConfirmModal"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteConfirmModalLabel">Подтвердите удаление</h5>
                    <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    Вы действительно хотите удалить сотрудника <strong id="deleteName"></strong>?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Отмена</button>
                    <a class="btn btn-danger" id="confirmDeleteBtn">Удалить</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

    </script>
</div>
