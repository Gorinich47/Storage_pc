<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div class="container mt-4">
        <h2>Список сотрудников</h2>

        <!-- Кнопка открытия модального окна добавления -->
        <button class="btn btn-primary mb-3" data-bs-target="#employeeModal"
                data-bs-toggle="modal"
                onclick="clearForm('Добавить сотрудника');"
                type="button">
            Добавить сотрудника
        </button>

        <!-- Таблица сотрудников -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Фамилия</th>
                <th>Имя</th>
                <th>Дата рождения</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Адрес</th>
                <th>Должность</th>
                <th>Дата приёма</th>
                <th>Дата увольнения</th>
                <th>Занятость</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="employee : ${employees}">
                <td th:text="${employee.id}"></td>
                <td th:text="${employee.firstName}"></td>
                <td th:text="${employee.lastName}"></td>
                <td th:text="${#dates.format(employee.birthDate, 'dd.MM.yyyy')}"></td>
                <td th:text="${employee.phoneNumber}"></td>
                <td th:text="${employee.emailAddress}"></td>
                <td th:text="${employee.address}"></td>
                <td th:text="${employee.postEmployee.title}"></td>
                <td th:text="${#dates.format(employee.dateStart, 'dd.MM.yyyy')}"></td>
                <td th:text="${#dates.format(employee.dateEnd, 'dd.MM.yyyy')}"></td>
                <td>
                    <span class="badge bg-success" th:if="${employee.isFullTime}">Полная</span>
                    <span class="badge bg-warning" th:unless="${employee.isFullTime}">Частичная</span>
                </td>
                <td>
                    <!-- Кнопка Редактировать -->
                    <button class="btn btn-sm btn-warning me-1" data-bs-target="#employeeModal"
                            data-bs-toggle="modal"
                            onclick="editModalForm(this,'/employee/fragments/client_edit_modal','Редактировать сотрудника')"
                            th:attr="data-id=${employee.id},
                                 data-first-name=${employee.firstName},
                                 data-last-name=${employee.lastName},
                                 data-birth-date=${#dates.format(employee.birthDate, 'yyyy-MM-dd')},
                                 data-phone-number=${employee.phoneNumber},
                                 data-email=${employee.emailAddress},
                                 data-address=${employee.address},
                                 data-post=${employee.postEmployee},
                                 data-date-start=${#dates.format(employee.dateStart, 'yyyy-MM-dd')},
                                 data-date-end=${#dates.format(employee.dateEnd, 'yyyy-MM-dd')},
                                 data-is-full-time=${employee.isFullTime}"
                            type="button">
                        Редактировать
                    </button>

                    <!-- Кнопка Удалить -->
                    <button class="btn btn-sm btn-danger" data-bs-target="#deleteConfirmModal"
                            data-bs-toggle="modal"
                            onclick="setDeleteId(this)"
                            th:attr="data-id=${employee.id},
                                    data-object-from-url-delete='employee',
                                    data-form-question-object=' данные сотрудника ',
                                    data-form-question-name=${employee.firstName + ' ' + employee.lastName}"
                            type="button">
                        Удалить
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно для добавления/редактирования сотрудника -->
    <div aria-hidden="true" aria-labelledby="employeeModalLabel" class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="container">
                    <div id="content-modal-form-id" th:insert="~{client_edit_modal :: content_modal_form}"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления -->
    <div aria-hidden="true" aria-labelledby="deleteConfirmModalLabel" class="modal fade" id="deleteConfirmModal"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteConfirmModalLabel">Подтвердите удаление</h5>
                    <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <a id="textFormQuestion"></a> <strong id="objectNameFormQuestion"></strong>?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Отмена</button>
                    <a class="btn btn-danger" id="confirmDeleteBtn">Удалить</a>
                </div>
            </div>
        </div>
    </div>

</div>
