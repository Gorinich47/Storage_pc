<div th:fragment="content" xmlns:th="http://www.thymeleaf.org">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="container mt-5">
        <h2 class="mb-4">Форма добавления нового бокса</h2>

        <form method="post" th:action="@{/box/add}" th:object="${box}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="id_box">Символьное обозначение бокса *</label>
                    <input class="form-control"
                           id="id_box"
                           placeholder="Например: A101"
                           th:field="*{id_box}"
                           type="text"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('id_box')}">
                        <small th:errors="*{id_box}"></small>
                    </div>
                </div>
            </div>

            <h5 class="mt-4">Общие параметры</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="square">Площадь (м²) *</label>
                    <input class="form-control"
                           id="square"
                           placeholder="Введите площадь"
                           step="0.01"
                           th:field="*{square}"
                           type="number"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('square')}">
                        <small th:errors="*{square}"></small>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label" for="length">Длина (м) *</label>
                    <input class="form-control"
                           id="length"
                           placeholder="Введите длину"
                           step="0.01"
                           th:field="*{length}"
                           type="number"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('length')}">
                        <small th:errors="*{length}"></small>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label" for="width">Ширина (м) *</label>
                    <input class="form-control"
                           id="width"
                           placeholder="Введите ширину"
                           step="0.01"
                           th:field="*{width}"
                           type="number"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('width')}">
                        <small th:errors="*{width}"></small>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label" for="height">Высота (м) *</label>
                    <input class="form-control"
                           id="height"
                           placeholder="Введите высоту"
                           step="0.01"
                           th:field="*{height}"
                           type="number"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('height')}">
                        <small th:errors="*{height}"></small>
                    </div>
                </div>
            </div>

            <h5 class="mt-4">Особые параметры</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="entrance">Тип входа</label>
                    <select class="form-select" id="entrance" th:field="*{entrance}">
                        <option value="">Выберите тип входа</option>
                        <option th:each="entrance : ${T(ru.storage.model.Entrance).values()}"
                                th:text="${entrance.title}"
                                th:value="${entrance}">Entrance
                        </option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('entrance')}">
                        <small th:errors="*{entrance}"></small>
                    </div>
                </div>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input"
                       id="isWarm"
                       th:field="*{isWarm}"
                       type="checkbox"/>
                <label class="form-check-label" for="isWarm">Отапливаемый</label>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input"
                       id="isElectricity"
                       th:field="*{isElectricity}"
                       type="checkbox"/>
                <label class="form-check-label" for="isElectricity">Есть электричество</label>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input"
                       id="isWater"
                       th:field="*{isWater}"
                       type="checkbox"/>
                <label class="form-check-label" for="isWater">Есть вода</label>
            </div>

            <button class="btn btn-success" type="submit">Сохранить бокс</button>
            <a class="btn btn-secondary" href="/" th:href="@{/}">Отмена</a>
        </form>
    </div>
</div>
